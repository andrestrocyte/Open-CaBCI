name: Demo smoke test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lightweight-demo:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Check out code and lightweight data
        uses: actions/checkout@v4
        with:
          filter: blob:none
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/openbmi/data_samples/demo_5min/

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install tested dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall -q openbmi run_demo.py

      - name: Run 1,000-frame demo
        run: python run_demo.py --dataset openbmi/data_samples/demo_1000 --frames 1000
